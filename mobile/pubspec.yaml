name: cognify_mobile
description: "NeuraCare - Understand • Heal • Thrive"
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.2
  shared_preferences: ^2.2.2
  fl_chart: ^0.65.0
  google_fonts: ^6.1.0
  intl: ^0.19.0
  provider: ^6.1.5+1
  url_launcher: ^6.2.5
  app_usage: ^4.1.0
  image_picker: ^1.2.1
  percent_indicator: ^4.2.5
  health: ^13.0.0
  permission_handler: ^11.3.0
  audioplayers: ^6.1.0
  vibration: ^2.0.0
  cached_network_image: ^3.4.1
  flutter_staggered_animations: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icon/
    - assets/audio/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0D0F1A"
  adaptive_icon_foreground: "assets/icon/icon.png"
  remove_alpha_ios: true
  web:
    generate: false
